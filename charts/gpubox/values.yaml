# Default values for gpubox.
#
# This chart intentionally runs with privileged permissions by default.

nameOverride: ""
fullnameOverride: ""

namespace:
  # Create a Namespace and apply labels/annotations (useful for PSA labels).
  # Note: the namespace name is always `.Release.Namespace`.
  create: false
  annotations: {}
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged

replicaCount: 1

image:
  repository: ghcr.io/donadiosolutions/gpubox
  # Release shipping should set this explicitly to the image tag that will ship
  # with the chart being published. When left empty, the chart falls back to
  # v<Chart.version>.
  tag: "v2.0.0"
  # Set this when release shipping intentionally reuses an existing immutable
  # image. Leave it empty when the release tag will build and publish a new
  # image for the selected tag.
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  # If empty and create=true, a name is generated using the release fullname.
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

pod:
  hostPID: false
  hostNetwork: false
  terminationGracePeriodSeconds: 5
  priorityClassName: ""
  runtimeClassName: ""

podSecurityContext: {}

containerSecurityContext:
  privileged: true
  allowPrivilegeEscalation: true
  runAsUser: 0

env:
  TUNNEL_NAME: gpubox
  WORKDIR: /home/gpubox/workspace

extraEnv: []
# Example:
# extraEnv:
#   - name: FOO
#     value: bar

envFrom: []

container:
  stdin: true
  tty: true

containerPorts:
  - name: ssh
    containerPort: 22
    protocol: TCP

ssh:
  # When set, a ConfigMap is created and an initContainer writes the keys to:
  #   <persistence.home.mountPath>/.ssh/authorized_keys
  #
  # Prefer setting these via a separate values file rather than `--set` on the CLI.
  authorizedKeys: []
  # If set, use an existing ConfigMap (must contain the key `authorized_keys`).
  existingAuthorizedKeysConfigMap: ""
  owner:
    uid: 1000
    gid: 1000
  initContainer:
    image:
      repository: busybox
      tag: "1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e"
      pullPolicy: IfNotPresent
    securityContext: {}
    resources: {}

command: []
args: []

resources:
  limits: {}
  requests:
    nvidia.com/gpu: 1
    cpu: 4
    memory: 16Gi

service:
  enabled: true
  annotations: {}
  labels: {}
  # A StatefulSet typically expects a headless Service for stable DNS.
  headless: true
  publishNotReadyAddresses: false
  type: ClusterIP
  clusterIP: ""
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      protocol: TCP

statefulSet:
  updateStrategy:
    type: OnDelete
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 10

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

persistence:
  home:
    enabled: true
    existingClaim: ""
    annotations: {}
    labels: {}
    storageClass: block-production
    accessModes:
      - ReadWriteOnce
    volumeMode: Filesystem
    size: 300Gi
    mountPath: /home/gpubox
    readOnly: false
  transfer:
    enabled: true
    existingClaim: ""
    annotations: {}
    labels: {}
    storageClass: file-production
    accessModes:
      - ReadWriteMany
    volumeMode: Filesystem
    size: 200Gi
    mountPath: /transfer
    readOnly: false
  tmp:
    enabled: true
    existingClaim: ""
    annotations: {}
    labels: {}
    storageClass: block
    accessModes:
      - ReadWriteOnce
    volumeMode: Filesystem
    size: 150Gi
    mountPath: /tmp
    readOnly: false
  hostRoot:
    enabled: true
    hostPath: /
    type: Directory
    mountPath: /host
    readOnly: false

extraVolumes: []
extraVolumeMounts: []

initContainers: []
sidecars: []

extraResources: []
# Example (object form):
# extraResources:
#   - apiVersion: v1
#     kind: ConfigMap
#     metadata:
#       name: "{{ include \"gpubox.fullname\" . }}-extra"
#       namespace: "{{ .Release.Namespace }}"
#     data:
#       key: value
#
# Example (string form):
# extraResources:
#   - |
#     apiVersion: v1
#     kind: Secret
#     metadata:
#       name: {{ include "gpubox.fullname" . }}-extra-secret
#     stringData:
#       token: change-me
